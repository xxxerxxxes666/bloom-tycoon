<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Moonlit Wreath greenhouse restored with violet glass, nightshade wreaths, and lantern beds">
  <defs>
    <radialGradient id="moonSky" cx="50%" cy="16%" r="72%">
      <stop offset="0" stop-color="#d9c7ff"/>
      <stop offset=".18" stop-color="#4d356e"/>
      <stop offset=".62" stop-color="#120d18"/>
      <stop offset="1" stop-color="#050405"/>
    </radialGradient>
    <linearGradient id="glassViolet" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#8d7bd0" stop-opacity=".72"/>
      <stop offset=".42" stop-color="#2b2647" stop-opacity=".78"/>
      <stop offset="1" stop-color="#08070b" stop-opacity=".96"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" x2="1">
      <stop offset="0" stop-color="#5a3d20"/>
      <stop offset=".45" stop-color="#d7b16d"/>
      <stop offset="1" stop-color="#4a2e16"/>
    </linearGradient>
    <radialGradient id="lantern" cx="50%" cy="40%" r="64%">
      <stop offset="0" stop-color="#fff4bd"/>
      <stop offset=".35" stop-color="#d7b16d" stop-opacity=".8"/>
      <stop offset="1" stop-color="#7d49b2" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

